<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course | Course Organizer</title>
    <link rel="stylesheet" href="css style.css">
</head>
<body>

    <header>
        <h1> Personal Course Organizer</h1>
        <p>Organize your university courses efficiently</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="my courses.html">My Courses</a></li>
            <li><a href="add course.html">Add Course</a></li>
            <li><a href="contact us.html">Contact Us</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2> Add a New Course</h2>
            <form action="#" method="post">
                <label for="courseName">Course Name:</label>
                <input type="text" id="courseName" name="courseName" required>

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" required>

                <label for="creditHours">Credit Hours:</label>
                <input type="number" id="creditHours" name="creditHours" min="1" max="6" required>

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" rows="4"></textarea>

                <button type="submit"> Add Course</button>
            </form>
        </section>
    </main>

    <footer>

        <p>&copy; 2026 Personal Course Organizer. All rights reserved.</p>
    </footer>

</body>
</html>
